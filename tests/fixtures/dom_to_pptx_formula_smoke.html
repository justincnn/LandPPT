<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280, initial-scale=1">
  <title>dom-to-pptx formula smoke</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    .pptx-slide {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #ffffff;
      color: #17212b;
    }

    .content {
      position: absolute;
      left: 96px;
      top: 86px;
      width: 860px;
      font-size: 28px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 44px;
      font-weight: 800;
    }

    p {
      margin: 0 0 18px;
      width: 760px;
    }

    .formula {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 8px;
      background: #eef6ef;
      color: #1f6b3a;
      font-family: "Cambria Math", "Times New Roman", serif;
      font-size: 30px;
    }

    .block-formula {
      display: inline-flex;
      margin-top: 12px;
      padding: 16px 24px;
      border: 1px solid rgba(31, 107, 58, 0.35);
      border-radius: 14px;
      background: #f6fbf7;
      font-family: "Cambria Math", "Times New Roman", serif;
      font-size: 36px;
    }
  </style>
</head>
<body>
  <section class="pptx-slide">
    <div class="content">
      <h1>公式内联导出</h1>
      <p>
        文本中包含公式
        <span class="formula" data-export-formula="true">E = mc²</span>
        时，需要给公式占位留出宽度，同时周围中文文本保持稳定行距。
      </p>
      <div class="block-formula" data-export-formula="true">∫₀¹ x² dx = 1/3</div>
    </div>
  </section>

  <section class="pptx-slide">
    <div class="content">
      <h1>公式块导出</h1>
      <p>第二页用于验证多页导出和公式图像捕获。</p>
      <div class="block-formula" data-formula="a^2+b^2=c^2">a² + b² = c²</div>
    </div>
  </section>

  <script src="../../src/landppt/web/static/js/dom-to-pptx.bundle.js"></script>
  <script>
    async function blobToBase64(blob) {
      const bytes = new Uint8Array(await blob.arrayBuffer());
      let binary = '';
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }

    window.runFormulaPptxSmokeTest = async function () {
      const slides = Array.from(document.querySelectorAll('.pptx-slide'));
      const blob = await window.domToPptx.exportToPptx(slides, {
        skipDownload: true,
        autoEmbedFonts: false,
        svgAsVector: false
      });
      return {
        slideCount: slides.length,
        patchVersion: window.domToPptx.__landpptPatchVersion,
        blobSize: blob.size,
        pptxBase64: await blobToBase64(blob)
      };
    };
  </script>
</body>
</html>
