{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "landppt.fullname" . }}-worker
  labels:
    {{- include "landppt.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "landppt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "landppt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.postgresql.enabled .Values.minio.enabled }}
      initContainers:
        {{- if .Values.minio.enabled }}
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "landppt.fullname" . }}-minio 9000; do
                echo "waiting for minio..."; sleep 2;
              done
        - name: ensure-minio-bucket
          image: {{ .Values.minio.mcImage }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "landppt.minioSecretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "landppt.minioSecretName" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: S3_BUCKET
              value: {{ .Values.storage.s3.bucket | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until mc alias set local http://{{ include "landppt.fullname" . }}-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."; sleep 2;
              done
              mc mb -p "local/$S3_BUCKET" || true
        {{- end }}
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "landppt.fullname" . }}-postgresql 5432; do
                echo "waiting for postgresql..."; sleep 2;
              done
        {{- end }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - landppt.cli
            - worker
            - --queue
            - {{ .Values.worker.queue | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "landppt.fullname" . }}
            - secretRef:
                name: {{ include "landppt.fullname" . }}
            {{- if .Values.app.existingSecret }}
            - secretRef:
                name: {{ .Values.app.existingSecret }}
            {{- end }}
            {{- if .Values.storage.s3.existingSecret }}
            - secretRef:
                name: {{ .Values.storage.s3.existingSecret }}
            {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
{{- end }}
