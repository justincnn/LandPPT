apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "landppt.fullname" . }}
  labels:
    {{- include "landppt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    # PVC 为 RWO，滚动更新会因卷占用卡住，故用 Recreate
    type: Recreate
  selector:
    matchLabels:
      {{- include "landppt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "landppt.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "landppt.fullname" . }}-postgresql 5432; do
                echo "waiting for postgresql..."; sleep 2;
              done
      {{- end }}
      containers:
        - name: landppt
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "landppt.fullname" . }}
            - secretRef:
                name: {{ include "landppt.fullname" . }}
            {{- if .Values.app.existingSecret }}
            - secretRef:
                name: {{ .Values.app.existingSecret }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # Chromium 需要大共享内存（对应 compose 的 shm_size）
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
            - name: reports
              mountPath: /app/research_reports
            - name: cache
              mountPath: /app/temp
            - name: lib
              mountPath: /app/lib
            {{- end }}
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "landppt.fullname" . }}-data
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "landppt.fullname" . }}-uploads
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "landppt.fullname" . }}-reports
        - name: cache
          persistentVolumeClaim:
            claimName: {{ include "landppt.fullname" . }}-cache
        - name: lib
          persistentVolumeClaim:
            claimName: {{ include "landppt.fullname" . }}-lib
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
