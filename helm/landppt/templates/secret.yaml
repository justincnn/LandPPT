apiVersion: v1
kind: Secret
metadata:
  name: {{ include "landppt.fullname" . }}
  labels:
    {{- include "landppt.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "landppt.databaseUrl" . | quote }}
  {{- if not .Values.app.existingSecret }}
  {{- range $key, $value := .Values.app.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
