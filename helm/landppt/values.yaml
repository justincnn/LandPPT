# Default values for landppt.

replicaCount: 1

web:
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: false
    minAvailable: 1

worker:
  enabled: true
  replicaCount: 1
  queue: default
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: false
    minAvailable: 1

networkPolicy:
  enabled: false

observability:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

image:
  repository: bradleylzh/landppt
  tag: "0.3.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

app:
  workers: 2
  logLevel: info
  # 应用配置（写入 ConfigMap，作为环境变量注入）
  env:
    LANDPPT_ENABLE_API_DOCS: "false"
    LANDPPT_ALLOW_HEADER_SESSION_AUTH: "false"
    INVITE_CODE_REQUIRED_FOR_REGISTRATION: "false"
    LANDPPT_BOOTSTRAP_ADMIN_ENABLED: "false"
    LANDPPT_AUTO_MIGRATE_ON_STARTUP: "false"
  # 敏感配置（写入 Secret）。生产环境必须改用 existingSecret。
  secrets: {}
  # 使用已有 Secret（key 即环境变量名）
  existingSecret: ""

migration:
  enabled: false
  hook: false
  backoffLimit: 3
  annotations: {}
  resources: {}

storage:
  backend: s3
  local:
    root: /app/data/artifacts
    publicBaseUrl: ""
  s3:
    # Used when minio.enabled=false. When minio.enabled=true, the in-chart MinIO service is used.
    endpointUrl: ""
    region: us-east-1
    bucket: landppt
    forcePathStyle: true
    publicBaseUrl: ""
    presignedUrlExpiresSeconds: 3600
    # Optional secret containing S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY.
    existingSecret: ""
    # Used only when existingSecret is empty and minio.enabled=false.
    accessKeyId: ""
    secretAccessKey: ""

minio:
  enabled: true
  image: minio/minio:RELEASE.2025-04-22T22-12-26Z
  mcImage: minio/mc:RELEASE.2025-04-16T18-13-26Z
  auth:
    existingSecret: ""
    rootUser: landppt
    # Override for production, or provide minio.auth.existingSecret.
    rootPassword: landppt-minio-secret
  persistence:
    storageClass: ""
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: landppt.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# 持久化数据卷（对应 docker-compose 的 named volumes）
persistence:
  enabled: false
  storageClass: ""
  data:
    size: 5Gi
  uploads:
    size: 10Gi
  reports:
    size: 5Gi
  cache:
    size: 5Gi
  lib:
    size: 1Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Chromium 需要大于默认 64MB 的共享内存（compose 里 shm_size: 4gb）
shmSize: 4Gi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext: {}
securityContext: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 40
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ---------- PostgreSQL ----------
postgresql:
  # true: 由本 chart 部署内置 PostgreSQL StatefulSet
  enabled: true
  image: postgres:16-alpine
  auth:
    username: landppt
    password: landppt
    database: landppt
  persistence:
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# 使用外部数据库时：postgresql.enabled=false 并设置完整连接串
externalDatabase:
  # 例：postgresql://user:pass@host:5432/dbname
  url: ""

# ---------- Valkey (cache) ----------
valkey:
  enabled: true
  image: valkey/valkey:8-alpine
  persistence:
    storageClass: ""
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# 使用外部 Valkey/Redis 时：valkey.enabled=false 并设置 URL
externalValkey:
  # 例：valkey://host:6379
  url: ""
